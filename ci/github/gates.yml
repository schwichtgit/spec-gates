# spec-gates CI boundary — projected by /speckit.gates.ci github
# Runs the IDENTICAL entrypoint used by the Claude Code Stop hook and the
# git pre-commit hook. Parity property: local green == CI green.
name: Quality Gates
on:
  pull_request:
  push:
    branches: [main]
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gate tooling
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jq shellcheck
          npm install -g prettier markdownlint-cli2
      - name: Run quality gates
        run: bash .specify/gates/verify.sh --boundary ci
