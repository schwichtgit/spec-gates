version: 2
updates:
  # GitHub Actions used by .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      # Conventional prefix so Dependabot's commits satisfy the commit-msg gate.
      prefix: "chore(deps)"

  # Node dev dependencies (pinned prettier / markdownlint-cli2).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  # Uncomment for other ecosystems a downstream fork might add:
  # - package-ecosystem: "pip"
